<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4db1ff"/>
      <stop offset="1" stop-color="#1f7fd6"/>
    </linearGradient>
  </defs>
  <!-- 背景：角丸スクエア -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#bg)"/>
  <!-- 幾何学アクセント（薄い白） -->
  <g fill="#ffffff" opacity="0.16">
    <circle cx="14" cy="50" r="3"/>
    <rect x="45" y="11" width="7" height="7" rx="2" transform="rotate(45 48.5 14.5)"/>
  </g>
  <!-- ハロー（黄色いリング） -->
  <circle cx="32" cy="30" r="17" fill="none" stroke="#ffd34e" stroke-width="3.5" opacity="0.95"/>
  <!-- ＋（ハロー十字） -->
  <g fill="#ffffff">
    <rect x="28.5" y="16" width="7" height="32" rx="3.5"/>
    <rect x="16" y="28.5" width="32" height="7" rx="3.5"/>
  </g>
</svg>
